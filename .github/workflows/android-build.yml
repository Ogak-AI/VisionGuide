name: Build React Native Android APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install JS dependencies
        working-directory: react-native-app
        run: npm install

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '11'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Generate Android project (if missing)
        working-directory: react-native-app
        run: |
          if [ ! -d android/gradle ]; then
            npx react-native upgrade --legacy true || true
          fi

      - name: Build APK
        working-directory: react-native-app/android
        run: |
          ./gradlew assembleDebug || echo "Gradle wrapper missing or build failed. Please ensure android/ is a full RN project."

      - name: Upload APK artifact
        if: success() || failure()
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: react-native-app/android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: warn
